<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存监控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #111; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; }
.bar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #e5e5e5; background: #fff; position: sticky; top: 0; z-index: 10; }
.bar input[type=text] { flex: 1; border: 1px solid #ccc; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; font-family: inherit; }
.bar input[type=text]:focus { border-color: #333; }
.bar input[type=number] { width: 60px; border: 1px solid #ccc; border-radius: 6px; padding: 7px 8px; font-size: 13px; outline: none; font-family: inherit; text-align: center; }
.bar label { font-size: 12px; color: #666; white-space: nowrap; }
button { border: 1px solid #ccc; border-radius: 6px; background: #fff; font-size: 13px; padding: 7px 14px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background .1s; }
button:hover { background: #f5f5f5; }
button.primary { background: #111; color: #fff; border-color: #111; }
button.primary:hover { background: #333; }
button.danger { background: #fff; color: #c00; border-color: #c00; }
button.danger:hover { background: #fff5f5; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.status-dot.live { background: #16a34a; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.cd { font-size: 13px; color: #888; min-width: 30px; }
.page { display: grid; grid-template-columns: 1fr 360px; gap: 0; height: calc(100vh - 53px); }
.main { overflow-y: auto; padding: 20px; border-right: 1px solid #e5e5e5; }
.sidebar { overflow-y: auto; padding: 16px; background: #fafafa; }
h2 { font-size: 13px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 12px; }
.sku-card { border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.sku-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #e5e5e5; background: #fff; }
.sku-pic { width: 36px; height: 36px; border-radius: 5px; object-fit: cover; background: #eee; flex-shrink: 0; }
.sku-title { flex: 1; min-width: 0; }
.sku-name { font-weight: 600; font-size: 14px; }
.sku-sub  { font-size: 12px; color: #888; margin-top: 2px; }
.sku-stock-badge { font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.stock-ok   { background: #f0fdf4; color: #16a34a; }
.stock-low  { background: #fefce8; color: #ca8a04; }
.stock-zero { background: #fef2f2; color: #dc2626; }
.stock-unk  { background: #f5f5f5; color: #888; }
.sku-stats { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #e5e5e5; }
.stat-cell { padding: 10px 14px; text-align: center; border-right: 1px solid #e5e5e5; }
.stat-cell:last-child { border-right: none; }
.stat-cell .val { font-size: 20px; font-weight: 700; }
.stat-cell .lbl { font-size: 11px; color: #888; margin-top: 2px; }
.val-orders { color: #16a34a; }
.val-avg    { color: #2563eb; }
.val-mode   { color: #7c3aed; }
.val-last   { color: #ea580c; }
.dist-wrap { padding: 12px 14px; }
.dist-wrap h3 { font-size: 12px; color: #888; margin-bottom: 10px; font-weight: 500; }
.dist-table { width: 100%; border-collapse: collapse; }
.dist-table th { font-size: 11px; color: #888; text-align: left; padding: 5px 8px; border-bottom: 1px solid #e5e5e5; font-weight: 500; }
.dist-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.dist-table tr:last-child td { border-bottom: none; }
.dist-bar-wrap { display: flex; align-items: center; gap: 8px; }
.dist-bar { height: 10px; background: #2563eb; border-radius: 2px; min-width: 2px; }
.pct { font-size: 11px; color: #888; }
.mode-row td { background: #faf5ff; font-weight: 600; }
.order-log { padding: 0 14px 12px; }
.order-log h3 { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; }
.log-list { max-height: 140px; overflow-y: auto; }
.log-item { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
.log-item:last-child { border-bottom: none; }
.log-time { color: #aaa; flex-shrink: 0; }
.log-qty  { font-weight: 600; color: #111; }
.log-stock{ color: #888; }
.info-block { margin-bottom: 20px; }
.info-block h2 { margin-bottom: 8px; }
.info-row  { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #ebebeb; font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-row .k { color: #666; }
.info-row .v { font-weight: 600; }
.rec-box { border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px; background: #fff; margin-bottom: 16px; }
.rec-box .rec-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.rec-val { font-size: 28px; font-weight: 700; color: #111; }
.rec-unit { font-size: 13px; color: #666; margin-top: 4px; }
.placeholder { display: flex; align-items: center; justify-content: center; height: 200px; color: #aaa; font-size: 13px; }
#event-log { font-size: 12px; color: #555; }
.ev { padding: 4px 0; border-bottom: 1px solid #ebebeb; display: flex; gap: 8px; }
.ev:last-child { border-bottom: none; }
.ev-t { color: #bbb; flex-shrink: 0; }
.ev-m { flex: 1; }
.ev-m.order { color: #16a34a; font-weight: 600; }
.ev-m.err   { color: #dc2626; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
@media(max-width:760px) { .page { grid-template-columns: 1fr; } .sidebar { border-top: 1px solid #e5e5e5; } }
</style>
</head>
<body>
<div class="bar">
  <span class="status-dot" id="dot"></span>
  <input type="text" id="url-in" placeholder="https://www.imini.tv/xingjunwenhua/wap_pro/58867721.html" />
  <label>每 <input type="number" id="itvl" value="3" min="1" max="60"> 秒</label>
  <button class="primary" id="tog" onclick="toggle()">开始</button>
  <button onclick="resetAll()">重置</button>
  <span class="cd" id="cd"></span>
</div>
<div class="page">
  <div class="main" id="main">
    <div class="placeholder" id="placeholder">输入链接后点击"开始"</div>
  </div>
  <div class="sidebar">
    <div class="info-block" id="rec-block" style="display:none">
      <h2>建议购买量</h2>
      <div class="rec-box">
        <div class="rec-label">众数（最常见的单笔下单量）</div>
        <div class="rec-val" id="rec-mode">—</div>
        <div class="rec-unit">件 / 单</div>
      </div>
      <div class="rec-box">
        <div class="rec-label">平均单笔下单量</div>
        <div class="rec-val" id="rec-avg">—</div>
        <div class="rec-unit">件 / 单</div>
      </div>
    </div>
    <div class="info-block">
      <h2>商品信息</h2>
      <div id="prod-info"><div style="color:#aaa;font-size:12px">等待数据...</div></div>
    </div>
    <div class="info-block">
      <h2>运行日志</h2>
      <div id="event-log">
        <div class="ev"><span class="ev-t">--:--:--</span><span class="ev-m">等待开始</span></div>
      </div>
    </div>
  </div>
</div>
<script>
const API = 'https://www.imini.tv/mallorder/api/specinfo.php';
const S = { running:false, timer:null, rounds:0, skus:{}, proName:'', proId:'', username:'' };
const $ = id => document.getElementById(id);
const ts = () => new Date().toLocaleTimeString('zh-CN',{hour12:false});
function evlog(msg,type=''){
  const el=$('event-log');
  const ph=el.querySelector('.ev-m');
  if(ph&&ph.textContent==='等待开始') el.innerHTML='';
  const d=document.createElement('div'); d.className='ev';
  d.innerHTML=`<span class="ev-t">${ts()}</span><span class="ev-m ${type}">${msg}</span>`;
  el.insertBefore(d,el.firstChild);
  while(el.children.length>80) el.removeChild(el.lastChild);
}
function parseUrl(url){
  const m=url.match(/imini\.tv\/([^\/]+)\/wap_pro\/(\d+)\.html/);
  if(m) return{username:m[1],proId:m[2]};
  const m2=url.match(/\/(\d+)\.html/);
  if(m2) return{username:'',proId:m2[1]};
  return null;
}
async function callApi(username,proId,channelId=''){
  const body=`username=${encodeURIComponent(username)}&pro_id=${encodeURIComponent(proId)}&channel_id=${encodeURIComponent(channelId)}&regionCode=`;
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function toggle(){
  S.running=!S.running;
  const btn=$('tog'),dot=$('dot');
  if(S.running){
    btn.textContent='停止'; btn.className='danger';
    dot.classList.add('live');
    const info=parseUrl($('url-in').value.trim());
    if(!info){alert('无法解析链接');S.running=false;return;}
    S.username=info.username; S.proId=info.proId;
    $('url-in').disabled=true;
    evlog('开始监控'); doFetch(); startTick();
  } else {
    btn.textContent='开始'; btn.className='primary';
    dot.classList.remove('live');
    clearInterval(S.timer); S.timer=null;
    $('cd').textContent=''; $('url-in').disabled=false;
    evlog('已停止');
  }
}
function startTick(){
  let left=parseInt($('itvl').value)||3; $('cd').textContent=left+'s';
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    if(!S.running) return;
    left--; $('cd').textContent=left+'s';
    if(left<=0){left=parseInt($('itvl').value)||3; doFetch();}
  },1000);
}
async function doFetch(){
  S.rounds++;
  try{
    const data=await callApi(S.username,S.proId);
    if(data.code!=='200'){evlog(`API错误: code=${data.code}`,'err');return;}
    processData(data);
  }catch(e){
    evlog(`请求失败: ${e.message}`,'err');
    if(e.message.includes('Failed to fetch')||e.message.includes('Load failed')){
      evlog('CORS限制，请改用 python3 server.py','err'); toggle();
    }
  }
}
function processData(data){
  S.proName=data.pro_name||'';
  $('prod-info').innerHTML=`
    <div class="info-row"><span class="k">商品名</span><span class="v" style="max-width:180px;text-align:right;font-size:12px">${S.proName}</span></div>
    <div class="info-row"><span class="k">单价</span><span class="v">¥${data.pro_price}</span></div>
    <div class="info-row"><span class="k">检测轮次</span><span class="v">${S.rounds}</span></div>`;
  const proSpec=data.pro_spec||{};
  let skuArr=[];
  if(Object.keys(proSpec).length>0){
    for(const[pid,spec] of Object.entries(proSpec))
      skuArr.push({skuId:spec.id||pid,name:spec.name||pid,price:spec.pro_price,stock:parseInt(spec.pro_stock)||0,pic:spec.pro_pic||''});
  } else {
    skuArr.push({skuId:data.pro_id,name:data.pro_name||data.pro_id,price:data.pro_price,stock:parseInt(data.pro_stock)||0,pic:data.pro_pic||''});
  }
  for(const sku of skuArr){
    const ex=S.skus[sku.skuId];
    if(!ex){
      S.skus[sku.skuId]={...sku,prevStock:sku.stock,orders:[]};
      evlog(`发现 ${sku.name}，库存 ${sku.stock}`);
    } else {
      ex.prevStock=ex.stock; ex.stock=sku.stock;
      const diff=ex.prevStock-ex.stock;
      if(diff>0){ ex.orders.push({time:ts(),qty:diff,stockBefore:ex.prevStock,stockAfter:ex.stock}); beep(); evlog(`${sku.name}  -${diff}件  (${ex.prevStock}→${ex.stock})`,'order'); }
      else if(diff<0){ evlog(`${sku.name} 补货 +${-diff}`); }
    }
  }
  renderMain(skuArr); updateGlobalRec();
}
function renderMain(skuArr){
  const main=$('main');
  const ph=$('placeholder'); if(ph) ph.style.display='none';
  let html='';
  for(const sku of skuArr){ const st=S.skus[sku.skuId]; if(st) html+=renderSkuCard(st); }
  main.innerHTML=html;
}
function renderSkuCard(st){
  let sc,sl;
  if(st.stock<0){sc='stock-unk';sl='未知';}
  else if(st.stock===0){sc='stock-zero';sl='缺货';}
  else if(st.stock<=20){sc='stock-low';sl=st.stock+' 件';}
  else{sc='stock-ok';sl=st.stock+' 件';}
  const orders=st.orders, n=orders.length;
  const totalQty=orders.reduce((s,o)=>s+o.qty,0);
  const avgQty=n>0?(totalQty/n).toFixed(1):'—';
  const lastQty=n>0?orders[n-1].qty:'—';
  const modeQty=calcMode(orders.map(o=>o.qty));
  const dist=buildDist(orders.map(o=>o.qty));
  const maxPct=dist.length?dist[0].pct:1;
  const distRows=dist.map(d=>`<tr class="${d.qty===modeQty?'mode-row':''}"><td><strong>${d.qty}</strong> 件/单</td><td>${d.count} 次</td><td><div class="dist-bar-wrap"><div class="dist-bar" style="width:${Math.round(d.pct/maxPct*120)}px"></div><span class="pct">${d.pct}%</span></div></td></tr>`).join('');
  const recentOrders=[...orders].reverse().slice(0,10);
  const logRows=recentOrders.map(o=>`<div class="log-item"><span class="log-time">${o.time}</span><span class="log-qty">-${o.qty} 件</span><span class="log-stock">${o.stockBefore} → ${o.stockAfter}</span></div>`).join('');
  const picHtml=st.pic?`<img class="sku-pic" src="${st.pic}" onerror="this.style.display='none'">`:`<div class="sku-pic"></div>`;
  return `<div class="sku-card">
  <div class="sku-head">${picHtml}<div class="sku-title"><div class="sku-name">${st.name}</div><div class="sku-sub">¥${st.price||'—'}</div></div><span class="sku-stock-badge ${sc}">${sl}</span></div>
  <div class="sku-stats">
    <div class="stat-cell"><div class="val val-orders">${n}</div><div class="lbl">检测到下单次数</div></div>
    <div class="stat-cell"><div class="val val-avg">${avgQty}</div><div class="lbl">平均每单件数</div></div>
    <div class="stat-cell"><div class="val val-mode">${modeQty!==null?modeQty:'—'}</div><div class="lbl">最常见每单件数</div></div>
    <div class="stat-cell"><div class="val val-last">${lastQty}</div><div class="lbl">最新一单件数</div></div>
  </div>
  ${dist.length>0?`<div class="dist-wrap"><h3>每单件数分布</h3><table class="dist-table"><thead><tr><th>件数/单</th><th>出现次数</th><th>占比</th></tr></thead><tbody>${distRows}</tbody></table></div>`:''}
  ${n>0?`<div class="order-log"><h3>下单记录（最近 ${Math.min(n,10)} 条）</h3><div class="log-list">${logRows}</div></div>`:''}
</div>`;
}
function calcMode(arr){
  if(!arr.length) return null;
  const freq={};
  for(const v of arr) freq[v]=(freq[v]||0)+1;
  return parseInt(Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0]);
}
function buildDist(arr){
  if(!arr.length) return [];
  const freq={};
  for(const v of arr) freq[v]=(freq[v]||0)+1;
  const total=arr.length;
  return Object.entries(freq).map(([qty,count])=>({qty:parseInt(qty),count,pct:Math.round(count/total*100)})).sort((a,b)=>b.count-a.count);
}
function updateGlobalRec(){
  const all=Object.values(S.skus).flatMap(s=>s.orders.map(o=>o.qty));
  if(!all.length) return;
  const mode=calcMode(all);
  const avg=(all.reduce((a,b)=>a+b,0)/all.length).toFixed(1);
  $('rec-mode').textContent=mode??'—'; $('rec-avg').textContent=avg;
  $('rec-block').style.display='block';
}
function resetAll(){
  S.skus={}; S.rounds=0; S.proName='';
  $('main').innerHTML='<div class="placeholder" id="placeholder">输入链接后点击"开始"</div>';
  $('prod-info').innerHTML='<div style="color:#aaa;font-size:12px">等待数据...</div>';
  $('rec-block').style.display='none';
  $('event-log').innerHTML=`<div class="ev"><span class="ev-t">${ts()}</span><span class="ev-m">已重置</span></div>`;
}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=900;
    g.gain.setValueAtTime(0.2,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start(); o.stop(ctx.currentTime+0.3);
  }catch(e){}
}
window.onload=()=>{ $('url-in').value='https://www.imini.tv/xingjunwenhua/wap_pro/58867721.html'; };
</script>
</body>
</html>
